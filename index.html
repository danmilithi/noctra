<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noctra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <header>
            <h1>Quem está assistindo?</h1>
        </header>
        <section aria-label="Perfis disponíveis">
            <ul class="profiles">
                <li class="profile">
                    <figure>
                        <img src="assets/perfil1.png" alt="Um personagem em estilo argila gótica com aparência de pequeno vampiro, olhos negros enormes e expressão sombria, vestindo roupas escuras com detalhes macabros.">
                        <figcaption>Daniel</figcaption>
                    </figure>
                </li>
                <li class="profile">
                    <figure>
                        <img src="assets/perfil2.png" alt="Uma personagem feminina gótica em estilo argila, com pele pálida, olhos escuros e maquiagem pesada, em um ambiente noturno com lua cheia e castelo ao fundo.">
                        <figcaption>Mariana</figcaption>
                    </figure>
                </li>
                <li class="profile">
                    <figure>
                        <img src="assets/perfil3.png" alt="Uma personagem feminina gótica em estilo argila, com pele pálida, olhos escuros e maquiagem pesada, em um ambiente noturno com lua cheia e castelo ao fundo.">
                        <figcaption>Thiago</figcaption>
                    </figure>
                </li>
                <li class="profile">
                    <figure>
                        <img src="assets/perfil4.png" alt="Uma personagem feminina gótica em estilo argila, com pele pálida, olhos escuros e maquiagem pesada, em um ambiente noturno com lua cheia e castelo ao fundo.">
                        <figcaption>Gabriel</figcaption>
                    </figure>
                </li>
            </ul>
        </section>
    </main>
</body>
</html>
