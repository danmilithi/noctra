<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noctra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <header>
            <h1>Quem está assistindo?</h1>
        </header>
        <section aria-label="Perfis disponíveis">
            <ul class="profiles">
                <li class="profile">
                    <button>
                    <figure>
                        <img src="assets/perfil1.png" alt="Perfil Daniel">
                        <figcaption>Daniel</figcaption>
                    </figure>
                    </button>
                </li>
                <li class="profile">
                    <button>
                    <figure>
                        <img src="assets/perfil2.png" alt="Perfil Mariana">
                        <figcaption>Mariana</figcaption>
                    </figure>
                    </button>
                </li>
                <li class="profile">
                    <button>
                    <figure>
                        <img src="assets/perfil3.png" alt="Perfil Thiago">
                        <figcaption>Thiago</figcaption>
                    </figure>
                    </button>
                </li>
                <li class="profile">
                    <button>
                    <figure>
                        <img src="assets/perfil4.png" alt="Perfil Gabriel">
                        <figcaption>Gabriel</figcaption>
                    </figure>
                    </button>
                </li>
            </ul>
        </section>
    </main>
</body>
</html>
